{% extends 'base.html' %}
{% load i18n %}

{% block content %}

<div class="col-md-6 offset-md-3">
    <h1>{% trans "Add Record" %}</h1>
    <br>

    <form method="POST" action="{% url 'add_record' %}">
        {% csrf_token %}
        {{ form.as_p }}

        <br>
        <a href="{% url 'home' %}" class="btn btn-dark">
            {% trans "Back" %}
        </a>
        <button type="submit" class="btn btn-secondary">
            {% trans "Add" %}
        </button>
    </form>
</div>

{% endblock %}
