{% extends 'base.html' %}
{% block content %}

<div class="col-md-6 offset-md-3">
    <h1>Add Record:</h1>

    <br>
    <!-- handmade form -->
    <form method="POST" action="{% url 'add_record' %}">
        <!-- token helps your form to not to get hijacked by hackers -->
        {% csrf_token %}
        {{ form.as_p }}

        <br>
        <button type="submit" class="btn btn-secondary">Login</button>
    </form>
</div>

{% endblock %}
