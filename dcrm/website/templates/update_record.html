{% extends 'base.html' %}
{% block content %}

<div class="col-md-6 offset-md-3">
    <h1>Update Record:</h1>

    <br>
    <!-- handmade form -->
    <form method="POST">
        <!-- token helps your form to not to get hijacked by hackers -->
        {% csrf_token %}
        {{ form.as_p }}

        <br>
        <a href="{% url 'record' current_record.id %}" class="btn btn-dark">Back</a>
        <button type="submit" class="btn btn-primary">Update</button>
    </form>
</div>

{% endblock %}
